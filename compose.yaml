services:
  app:
    build: .
    depends_on:
      - postgres
      - redis
    ports:
      - "8000:8000"
    volumes:
      - .:/app

  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: brim_app
      POSTGRES_PASSWORD: brim2026!
      POSTGRES_DB: brim
    volumes:
      - ./db/postgres:/var/lib/postgresql/data


  redis:
    image: redis:7